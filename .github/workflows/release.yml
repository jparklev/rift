name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "26.5.0"
  BUN_VERSION: "1.3.14"
  NPM_VERSION: "12.0.1"

jobs:
  validate:
    name: Validate source and release versions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Match every package to the release tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "rift-cli") | .version')"
          if [ "$TAG" != "v$version" ]; then
            echo "Release tag $TAG must match crate version v$version."
            exit 1
          fi
          node scripts/check-npm-versions.mjs "${TAG#v}"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run source tests
        run: cargo test --workspace --locked

      - name: Verify installed JavaScript toolchains
        run: |
          test "$(node --version)" = "v${NODE_VERSION}"
          test "$(bun --version)" = "${BUN_VERSION}"

  build:
    name: Build ${{ matrix.platform }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            executable: rift
            library: librift_ffi.so
            archive: tar
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            executable: rift
            library: librift_ffi.so
            archive: tar
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: darwin-x64
            executable: rift
            library: librift_ffi.dylib
            archive: tar
          - os: macos-15
            target: aarch64-apple-darwin
            platform: darwin-arm64
            executable: rift
            library: librift_ffi.dylib
            archive: tar
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            platform: windows-x64
            executable: rift.exe
            library: rift_ffi.dll
            archive: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: windows-arm64
            executable: rift.exe
            library: rift_ffi.dll
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Build native artifacts
        run: cargo build --package rift-cli --package rift-ffi --release --locked --target ${{ matrix.target }}

      - name: Populate npm prebuild
        shell: bash
        run: node scripts/prepare-npm-prebuild.mjs "npm/rift-snapshot/prebuilds/${{ matrix.platform }}" "target/${{ matrix.target }}/release/${{ matrix.executable }}" "target/${{ matrix.target }}/release/${{ matrix.library }}"

      - name: Package archive
        if: matrix.archive == 'tar'
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          EXECUTABLE: ${{ matrix.executable }}
        run: |
          mkdir dist
          tar -C "target/$TARGET/release" -czf "dist/rift-$TAG-$TARGET.tar.gz" "$EXECUTABLE"

      - name: Package archive
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          EXECUTABLE: ${{ matrix.executable }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "target/$env:TARGET/release/$env:EXECUTABLE" -DestinationPath "dist/rift-$env:TAG-$env:TARGET.zip"

      - name: Upload release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

      - name: Upload npm prebuild
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-prebuild-${{ matrix.platform }}
          path: npm/rift-snapshot/prebuilds/${{ matrix.platform }}
          if-no-files-found: error

  package:
    name: Pack and exercise npm artifact
    needs: build
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install release npm
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - name: Download Linux x64 prebuild
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-prebuild-linux-x64
          path: npm/rift-snapshot/prebuilds/linux-x64

      - name: Download Linux arm64 prebuild
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-prebuild-linux-arm64
          path: npm/rift-snapshot/prebuilds/linux-arm64

      - name: Download macOS x64 prebuild
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-prebuild-darwin-x64
          path: npm/rift-snapshot/prebuilds/darwin-x64

      - name: Download macOS arm64 prebuild
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-prebuild-darwin-arm64
          path: npm/rift-snapshot/prebuilds/darwin-arm64

      - name: Download Windows x64 prebuild
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-prebuild-windows-x64
          path: npm/rift-snapshot/prebuilds/windows-x64

      - name: Download Windows arm64 prebuild
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-prebuild-windows-arm64
          path: npm/rift-snapshot/prebuilds/windows-arm64

      - name: Restore executable permissions
        run: chmod +x npm/rift-snapshot/prebuilds/linux-*/rift npm/rift-snapshot/prebuilds/darwin-*/rift

      - name: Pack release artifact
        id: pack
        shell: bash
        run: |
          output="$RUNNER_TEMP/rift-npm-package"
          mkdir -p "$output"
          npm pack ./npm/rift-snapshot --json --pack-destination "$output" > "$output/pack.json"
          filename="$(node -e 'const [entry] = JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")); process.stdout.write(entry.filename)' "$output/pack.json")"
          echo "tarball=$output/$filename" >> "$GITHUB_OUTPUT"

      - name: Verify packed contents
        run: node scripts/verify-npm-package.mjs "${{ steps.pack.outputs.tarball }}"

      - name: Install packed artifact without lifecycle scripts
        shell: bash
        run: |
          consumer="$RUNNER_TEMP/rift-npm-consumer"
          mkdir -p "$consumer"
          npm install --prefix "$consumer" --ignore-scripts "${{ steps.pack.outputs.tarball }}"
          cp scripts/test-packed-api.mjs scripts/test-packed-cli.mjs "$consumer/"

      - name: Exercise packed Node FFI API
        working-directory: ${{ runner.temp }}/rift-npm-consumer
        run: node --experimental-ffi ./test-packed-api.mjs

      - name: Exercise packed Bun FFI API
        working-directory: ${{ runner.temp }}/rift-npm-consumer
        run: bun ./test-packed-api.mjs

      - name: Exercise packed CLI
        working-directory: ${{ runner.temp }}/rift-npm-consumer
        run: node ./test-packed-cli.mjs

      - name: Upload tested npm artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error

  publish:
    name: Publish release and npm package
    needs: [build, package]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Download tested npm artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: npm-package

      - name: Create checksums
        working-directory: dist
        run: sha256sum rift-* > SHA256SUMS

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --verify-tag --generate-notes --title "$TAG"
          fi

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          registry-url: "https://registry.npmjs.org"

      - name: Install release npm
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - name: Publish the tested npm artifact
        run: npm publish npm-package/*.tgz --provenance
