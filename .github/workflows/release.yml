name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "26.5.0"
  BUN_VERSION: "1.3.14"
  NPM_VERSION: "12.0.1"

jobs:
  validate:
    name: Validate source and release versions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Install release npm
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Match every package to the release tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "rift-cli") | .version')"
          if [ "$TAG" != "v$version" ]; then
            echo "Release tag $TAG must match crate version v$version."
            exit 1
          fi
          node scripts/check-npm-versions.mjs "${TAG#v}"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run source tests
        run: cargo test --workspace --locked

      - name: Verify installed JavaScript toolchains
        run: |
          test "$(node --version)" = "v${NODE_VERSION}"
          test "$(bun --version)" = "${BUN_VERSION}"
          test "$(npm --version)" = "${NPM_VERSION}"

  build:
    name: Build ${{ matrix.platform }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            executable: rift
            library: librift_ffi.so
            archive: tar
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            executable: rift
            library: librift_ffi.so
            archive: tar
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: darwin-x64
            executable: rift
            library: librift_ffi.dylib
            archive: tar
          - os: macos-15
            target: aarch64-apple-darwin
            platform: darwin-arm64
            executable: rift
            library: librift_ffi.dylib
            archive: tar
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            platform: windows-x64
            executable: rift.exe
            library: rift_ffi.dll
            archive: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: windows-arm64
            executable: rift.exe
            library: rift_ffi.dll
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Install release npm
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - name: Install Linux package filesystem tools
        if: startsWith(matrix.platform, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install --yes xfsprogs

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Build native artifacts
        run: cargo build --package rift-cli --package rift-ffi --release --locked --target ${{ matrix.target }}

      - name: Pack native npm artifact
        shell: bash
        run: |
          package="npm/rift-${{ matrix.platform }}"
          output="npm-dist"
          node scripts/prepare-npm-native.mjs "$package" "target/${{ matrix.target }}/release/${{ matrix.executable }}" "target/${{ matrix.target }}/release/${{ matrix.library }}"
          mkdir -p "$output"
          npm pack "$package" --json --pack-destination "$output" > "$output/pack.json"
          filename="$(node scripts/npm-pack-filename.mjs "$output/pack.json")"
          node scripts/verify-npm-native-package.mjs "$output/$filename" "${{ matrix.platform }}"

      - name: Exercise the matching packed npm artifacts
        shell: bash
        run: |
          set -euo pipefail
          platform="${{ matrix.platform }}"
          native="$(find npm-dist -maxdepth 1 -name '*.tgz' -print -quit)"
          test -n "$native"
          if [[ "$platform" == linux-* ]]; then
            RIFT_FIXTURE_EXCLUDE_TARGET=1 \
              RIFT_NATIVE_PLATFORM="$platform" \
              RIFT_NATIVE_TARBALL="$native" \
              bash scripts/ci/linux-fs.sh xfs-reflink -- \
                bash scripts/ci/linux-package-e2e.sh
            exit 0
          fi
          output="$(mktemp -d)"
          cleanup() {
            rm -rf "$output"
          }
          trap cleanup EXIT
          npm pack ./npm/rift --json --pack-destination "$output" > "$output/root-pack.json"
          root="$output/$(node scripts/npm-pack-filename.mjs "$output/root-pack.json")"
          if [[ "$platform" == windows-* ]]; then
            mode=unavailable
          else
            mode=lifecycle
          fi
          bash scripts/ci/packed-npm-e2e.sh "$platform" "$mode" "$root" "$native"

      - name: Package archive
        if: matrix.archive == 'tar'
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          EXECUTABLE: ${{ matrix.executable }}
        run: |
          mkdir dist
          tar -C "target/$TARGET/release" -czf "dist/rift-$TAG-$TARGET.tar.gz" "$EXECUTABLE"

      - name: Package archive
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          EXECUTABLE: ${{ matrix.executable }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "target/$env:TARGET/release/$env:EXECUTABLE" -DestinationPath "dist/rift-$env:TAG-$env:TARGET.zip"

      - name: Upload release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

      - name: Upload native npm artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-native-${{ matrix.platform }}
          path: npm-dist/*.tgz
          if-no-files-found: error

  package:
    name: Pack and exercise npm artifact
    needs: build
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install release npm
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - name: Download the matching native package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-native-darwin-arm64
          path: ${{ runner.temp }}/rift-npm-native

      - name: Pack public release artifact
        id: pack
        shell: bash
        run: |
          output="$RUNNER_TEMP/rift-npm-package"
          native_directory="$RUNNER_TEMP/rift-npm-native"
          mkdir -p "$output"
          native="$(find "$native_directory" -maxdepth 1 -name '*.tgz' -print -quit)"
          test -n "$native"
          node scripts/verify-npm-native-package.mjs "$native" darwin-arm64
          npm pack ./npm/rift --json --pack-destination "$output" > "$output/pack.json"
          filename="$(node scripts/npm-pack-filename.mjs "$output/pack.json")"
          node scripts/verify-npm-package.mjs "$output/$filename"
          consumer="$RUNNER_TEMP/rift-npm-consumer"
          mkdir -p "$consumer"
          npm install --prefix "$consumer" --ignore-scripts --omit=optional "$output/$filename"
          cp scripts/test-missing-native.mjs scripts/test-packed-api.mjs scripts/test-packed-cli.mjs "$consumer/"
          echo "tarball=$output/$filename" >> "$GITHUB_OUTPUT"
          echo "consumer=$consumer" >> "$GITHUB_OUTPUT"
          echo "native=$native" >> "$GITHUB_OUTPUT"

      - name: Verify missing native package diagnostics
        working-directory: ${{ steps.pack.outputs.consumer }}
        run: node --experimental-ffi ./test-missing-native.mjs

      - name: Install matching native package without lifecycle scripts
        run: npm install --prefix "${{ steps.pack.outputs.consumer }}" --ignore-scripts --omit=optional "${{ steps.pack.outputs.native }}"

      - name: Exercise packed Node FFI API
        working-directory: ${{ steps.pack.outputs.consumer }}
        run: node --experimental-ffi ./test-packed-api.mjs

      - name: Exercise packed Bun FFI API
        working-directory: ${{ steps.pack.outputs.consumer }}
        run: bun ./test-packed-api.mjs

      - name: Exercise packed CLI
        working-directory: ${{ steps.pack.outputs.consumer }}
        run: node ./test-packed-cli.mjs

      - name: Upload tested public npm artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-root-package
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error

  publish:
    name: Publish release and npm package
    needs: [build, package]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Download native npm artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: npm-native-*
          path: npm-native
          merge-multiple: true

      - name: Download tested public npm artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-root-package
          path: npm-root

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          registry-url: "https://registry.npmjs.org"

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install release npm
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - name: Install XFS reflink test tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes xfsprogs

      - name: Publish native packages first
        env:
          NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${NPM_PUBLISH_TOKEN:-}" ]]; then
            export NODE_AUTH_TOKEN="$NPM_PUBLISH_TOKEN"
          fi
          for manifest in npm/rift-*/package.json; do
            name="$(node -e 'const manifest = JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")); process.stdout.write(manifest.name)' "$manifest")"
            version="$(node -e 'const manifest = JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")); process.stdout.write(manifest.version)' "$manifest")"
            tarball="$(node scripts/npm-find-tarball.mjs npm-native "$name" "$version")"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              test "$(npm view "$name@$version" version)" = "$version"
              echo "$name@$version is already published"
            else
              npm publish "$tarball" --provenance --access public
            fi
          done

      - name: Verify every native package is available
        shell: bash
        run: |
          set -euo pipefail
          for manifest in npm/rift-*/package.json; do
            name="$(node -e 'const manifest = JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")); process.stdout.write(manifest.name)' "$manifest")"
            version="$(node -e 'const manifest = JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")); process.stdout.write(manifest.version)' "$manifest")"
            test "$(npm view "$name@$version" version)" = "$version"
          done

      - name: Exercise a normal optional-dependency installation
        shell: bash
        run: |
          set -euo pipefail
          root="$(find npm-root -type f -name '*.tgz' -print -quit)"
          test -n "$root"
          RIFT_FIXTURE_EXCLUDE_TARGET=1 \
            RIFT_PACKED_ROOT_TARBALL="$root" \
            bash scripts/ci/linux-fs.sh xfs-reflink -- \
              bash -c 'bash scripts/ci/packed-npm-e2e.sh linux-x64 lifecycle "$RIFT_PACKED_ROOT_TARBALL"'

      - name: Publish the tested public npm artifact
        env:
          NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${NPM_PUBLISH_TOKEN:-}" ]]; then
            export NODE_AUTH_TOKEN="$NPM_PUBLISH_TOKEN"
          fi
          root="$(find npm-root -type f -name '*.tgz' -print -quit)"
          test -n "$root"
          name="$(node -e 'const manifest = JSON.parse(require("node:fs").readFileSync("npm/rift/package.json", "utf8")); process.stdout.write(manifest.name)')"
          version="$(node -e 'const manifest = JSON.parse(require("node:fs").readFileSync("npm/rift/package.json", "utf8")); process.stdout.write(manifest.version)')"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            test "$(npm view "$name@$version" version)" = "$version"
            echo "$name@$version is already published"
          else
            npm publish "$root" --provenance --access public
          fi

      - name: Create checksums
        working-directory: dist
        run: sha256sum rift-* > SHA256SUMS

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --verify-tag --generate-notes --title "$TAG"
          fi
