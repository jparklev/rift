name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test and validate version
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Match tag to crate version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "rift-cli") | .version')"
          if [ "$TAG" != "v$version" ]; then
            echo "Release tag $TAG must match crate version v$version."
            exit 1
          fi

      - name: Run tests
        run: cargo test --workspace --locked

  build:
    name: Build ${{ matrix.target }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            executable: rift
            archive: tar
          - os: macos-14
            target: x86_64-apple-darwin
            executable: rift
            archive: tar
          - os: macos-14
            target: aarch64-apple-darwin
            executable: rift
            archive: tar
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            executable: rift.exe
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --package rift-cli --release --locked --target ${{ matrix.target }}

      - name: Package archive
        if: matrix.archive == 'tar'
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          EXECUTABLE: ${{ matrix.executable }}
        run: |
          mkdir dist
          tar -C "target/$TARGET/release" -czf "dist/rift-$TAG-$TARGET.tar.gz" "$EXECUTABLE"

      - name: Package archive
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          EXECUTABLE: ${{ matrix.executable }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "target/$env:TARGET/release/$env:EXECUTABLE" -DestinationPath "dist/rift-$env:TAG-$env:TARGET.zip"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: rift-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum rift-* > SHA256SUMS

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --verify-tag --generate-notes --title "$TAG"
          fi
