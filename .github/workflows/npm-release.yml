name: Npm Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate npm versions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Match npm packages to release tag
        env:
          TAG: ${{ github.ref_name }}
        run: node scripts/check-npm-versions.mjs "${TAG#v}"

  build:
    name: Build npm ${{ matrix.platform }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            executable: rift
            library: librift_ffi.so
          - os: macos-14
            target: x86_64-apple-darwin
            platform: darwin-x64
            executable: rift
            library: librift_ffi.dylib
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin-arm64
            executable: rift
            library: librift_ffi.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
            executable: rift.exe
            library: rift_ffi.dll
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build native artifacts
        run: cargo build --package rift-cli --package rift-ffi --release --locked --target ${{ matrix.target }}

      - name: Populate prebuild
        shell: bash
        run: node scripts/prepare-npm-prebuild.mjs "npm/rift-snapshot/prebuilds/${{ matrix.platform }}" "target/${{ matrix.target }}/release/${{ matrix.executable }}" "target/${{ matrix.target }}/release/${{ matrix.library }}"

      - name: Upload prebuild
        uses: actions/upload-artifact@v4
        with:
          name: npm-prebuild-${{ matrix.platform }}
          path: npm/rift-snapshot/prebuilds/${{ matrix.platform }}
          if-no-files-found: error

  publish:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.10.0

      - name: Download Linux x64 prebuild
        uses: actions/download-artifact@v4
        with:
          name: npm-prebuild-linux-x64
          path: npm/rift-snapshot/prebuilds/linux-x64

      - name: Download macOS x64 prebuild
        uses: actions/download-artifact@v4
        with:
          name: npm-prebuild-darwin-x64
          path: npm/rift-snapshot/prebuilds/darwin-x64

      - name: Download macOS arm64 prebuild
        uses: actions/download-artifact@v4
        with:
          name: npm-prebuild-darwin-arm64
          path: npm/rift-snapshot/prebuilds/darwin-arm64

      - name: Download Windows x64 prebuild
        uses: actions/download-artifact@v4
        with:
          name: npm-prebuild-windows-x64
          path: npm/rift-snapshot/prebuilds/windows-x64

      - name: Restore executable permissions
        run: chmod +x npm/rift-snapshot/prebuilds/linux-x64/* npm/rift-snapshot/prebuilds/darwin-x64/* npm/rift-snapshot/prebuilds/darwin-arm64/*

      - name: Publish launcher package
        run: npm publish ./npm/rift-snapshot --provenance
