name: Linux Filesystems Extended

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  linux-extended-filesystem-test:
    name: Linux extended filesystem tests (${{ matrix.filesystem }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - filesystem: zfs
            packages: zfsutils-linux
            required_env: RIFT_REQUIRE_REFLINK_TESTS
            experimental: false
          - filesystem: bcachefs
            packages: bcachefs-tools
            required_env: RIFT_REQUIRE_REFLINK_TESTS
            experimental: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install filesystem tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ${{ matrix.packages }}

      - name: Create filesystem workspace
        run: bash scripts/ci/linux-fs.sh "${{ matrix.filesystem }}"

      - name: Run tests on filesystem
        working-directory: /mnt/rift-${{ matrix.filesystem }}/rift
        run: ${{ matrix.required_env }}=1 cargo test --package rift --locked
