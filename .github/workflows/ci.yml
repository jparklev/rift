name: CI

on:
  push:
    branches:
      - dev
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --workspace --locked

  linux-filesystem-test:
    name: Linux filesystem tests (${{ matrix.filesystem }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - filesystem: btrfs
            packages: btrfs-progs
            required_env: RIFT_REQUIRE_BTRFS_TESTS
          - filesystem: xfs-reflink
            packages: xfsprogs
            required_env: RIFT_REQUIRE_REFLINK_TESTS
          - filesystem: zfs
            packages: zfsutils-linux
            required_env: RIFT_REQUIRE_REFLINK_TESTS
          - filesystem: bcachefs
            packages: bcachefs-tools
            required_env: RIFT_REQUIRE_REFLINK_TESTS
          - filesystem: xfs-no-reflink
            packages: xfsprogs
            required_env: RIFT_REQUIRE_UNSUPPORTED_LINUX_TESTS
          - filesystem: ext4
            packages: e2fsprogs
            required_env: RIFT_REQUIRE_UNSUPPORTED_LINUX_TESTS
          - filesystem: tmpfs
            packages: ""
            required_env: RIFT_REQUIRE_UNSUPPORTED_LINUX_TESTS
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install filesystem tools
        if: matrix.packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install --yes ${{ matrix.packages }}

      - name: Create filesystem workspace
        run: bash scripts/ci/linux-fs.sh "${{ matrix.filesystem }}"

      - name: Run tests on filesystem
        working-directory: /mnt/rift-${{ matrix.filesystem }}/rift
        run: ${{ matrix.required_env }}=1 cargo test --package rift --locked

  apfs-test:
    name: APFS integration tests
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests on APFS
        env:
          RIFT_REQUIRE_APFS_TESTS: "1"
        run: cargo test --package rift --locked
